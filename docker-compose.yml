version: "3.8"

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-lacasastudio-v2-super-secret-key-prod-2025-minimum-32-chars}
      - DATABASE_URL=file:/app/data/lacasastudio.db
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    volumes:
      - app-data:/app/data
      - app-uploads:/app/server/uploads
    restart: unless-stopped

volumes:
  app-data:
  app-uploads:
