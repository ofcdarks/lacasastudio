version: "3.8"
services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - lacasa-data:/app/data
      - lacasa-uploads:/app/server/uploads
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/lacasastudio.db
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - lacasa-redis:/data
    restart: unless-stopped

volumes:
  lacasa-data:
  lacasa-uploads:
  lacasa-redis:
