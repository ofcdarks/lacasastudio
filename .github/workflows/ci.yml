name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: test-secret-minimum-32-characters-long-for-ci-testing
      DATABASE_URL: file:./test.db
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Generate Prisma client
        run: cd server && npx prisma generate

      - name: Push database schema
        run: cd server && npx prisma db push

      - name: Lint server
        run: cd server && npm run lint || true

      - name: Run server tests
        run: cd server && npm test

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Type check client
        run: cd client && npx tsc --noEmit

      - name: Build client
        run: cd client && npx vite build

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t lacasastudio:${{ github.sha }} .

      - name: Test Docker image
        run: |
          docker run -d --name test \
            -e JWT_SECRET=test-secret-minimum-32-characters-long-for-ci \
            -e DATABASE_URL=file:/app/data/test.db \
            -p 3000:3000 \
            lacasastudio:${{ github.sha }}
          sleep 5
          curl -f http://localhost:3000/api/health || exit 1
          docker stop test
