name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root deps
        run: npm install

      - name: Install server deps
        run: cd server && npm install

      - name: Install client deps
        run: cd client && npm install

      - name: Generate Prisma
        run: cd server && npx prisma generate

      - name: Build client
        run: cd client && npm run build

      - name: Run server tests
        run: cd server && npm test || true
        env:
          DATABASE_URL: "file:./test.db"
          JWT_SECRET: "ci-test-secret-minimum-32-characters-long"

  docker:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t lacasastudio:latest .

      - name: Test Docker image
        run: |
          docker run -d --name lc-test \
            -e JWT_SECRET="ci-test-secret-minimum-32-characters-long" \
            -e DATABASE_URL="file:/app/data/lacasastudio.db" \
            -p 3000:3000 lacasastudio:latest
          sleep 10
          curl -f http://localhost:3000/api/health || exit 1
          docker stop lc-test
